version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce}
      POSTGRES_USER: ${DB_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecommerce_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce_user} -d ${DB_NAME:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_redis_password} --save 60 1 --loglevel warning
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_this_redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: postgresql://${DB_USER:-ecommerce_user}:${DB_PASSWORD:-ecommerce_pass}@postgres:5432/${DB_NAME:-ecommerce}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_this_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - ecommerce
    security_opt:
      - no-new-privileges:true
    # Uncomment for development with hot reload
    # volumes:
    #   - ./backend/src:/app/src:cached
    # command: npm run dev
    command: >
      sh -c "node src/db/init.js && node src/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: ecommerce_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - ecommerce
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ:-UTC}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  ecommerce:
    driver: bridge
